# Catalog / discovery sources. These describe *search endpoints* (not data),
# so they are kept out of sources.toml to reduce noise for signal-producing
# pipelines. `load_sources(sources.toml)` automatically merges any sibling
# `catalogs.toml`, so the `hoover ingest-ckan` / `ingest-socrata` /
# `ingest-opendatasoft` commands continue to find these names without any
# new CLI flag. Every entry here must be tagged `purpose = "catalog"` so the
# source-contract test keeps passing.

[[sources]]
name = "datagov_catalog_climate"
kind = "ckan_package_search"
url = "https://catalog.data.gov/api/3/action/package_search?q=climate&rows=50"
description = "Data.gov catalog CKAN package_search for 'climate' (50 results)."
license = "per-package"
redistribute = "per-package"
purpose = "catalog"

[[sources]]
name = "hdx_catalog_cholera"
kind = "ckan_package_search"
url = "https://data.humdata.org/api/3/action/package_search?q=cholera&rows=50"
description = "HDX catalog CKAN package_search for 'cholera' (50 results)."
license = "per-package"
redistribute = "per-package"
purpose = "catalog"

[[sources]]
name = "socrata_example"
kind = "socrata_soda"
url = "https://data.cityofnewyork.us/resource/erm2-nwe9.json?$limit=50"
description = "Socrata SODA example (NYC 311, 50 records)."
license = "nyc-open-data"
redistribute = "with-attribution"
purpose = "catalog"

[[sources]]
name = "opendatasoft_example"
kind = "opendatasoft_explore"
# Note: this dataset endpoint is confirmed working with the Explore v2.1 API.
url = "https://public.opendatasoft.com/api/explore/v2.1/catalog/datasets/geonames-all-cities-with-a-population-1000/records?limit=50"
description = "Opendatasoft Explore API example (geonames cities, 50 records)."
license = "CC-BY-4.0"
redistribute = "with-attribution"
purpose = "catalog"
