# --------------------------------------------------------------------------- #
# Signal producer thresholds. Keys not present here fall back to the defaults
# in `SIGNAL_THRESHOLD_DEFAULTS` in `src/datahoover/sources.py`.
# --------------------------------------------------------------------------- #

[signals.earthquake]
min_magnitude = 5.0

[signals.gdacs]
min_severity = 0.6

[signals.ooni]
min_total = 10
min_current_ratio = 0.5
min_ratio_delta = 0.3

[signals.market_move]
min_abs_return = 0.02
severity_denominator = 0.10
